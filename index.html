<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS агрегатор</title>
  <!-- Bootstrap CSS через CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <h1 class="display-4 text-center mb-4">RSS агрегатор</h1>
        
        <form class="rss-form">
          <div class="mb-3">
            <label for="url-input" class="form-label">Ссылка RSS</label>
            <div class="d-flex">
              <input 
                type="text" 
                name="url"
                id="url-input" 
                class="form-control" 
                placeholder="https://example.com/rss"
                aria-label="url"
              >
              <button type="submit" class="btn btn-primary ms-2">Добавить</button>
            </div>
            <div class="feedback text-danger small mt-1"></div>
          </div>
        </form>

        <!-- Вкладки -->
        <ul class="nav nav-tabs mt-4" id="myTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="feeds-tab" data-bs-toggle="tab" data-bs-target="#feeds" type="button" role="tab" aria-controls="feeds" aria-selected="true">Фиды</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="posts-tab" data-bs-toggle="tab" data-bs-target="#posts" type="button" role="tab" aria-controls="posts" aria-selected="false">Посты</button>
          </li>
        </ul>

        <!-- Контент вкладок -->
        <div class="tab-content mt-3" id="myTabContent">
          <div class="tab-pane fade show active" id="feeds" role="tabpanel" aria-labelledby="feeds-tab">
            <div class="feeds"></div>
          </div>
          <div class="tab-pane fade" id="posts" role="tabpanel" aria-labelledby="posts-tab">
            <div class="posts"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно -->
  <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-footer">
          <a href="#" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Читать полностью</a>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Скрипты -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
