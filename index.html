<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS агрегатор</title>
  <!-- Bootstrap CSS через CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <h1 class="display-4 text-center mb-4">RSS агрегатор</h1>
        
        <form class="rss-form">
          <div class="mb-3">
            <label for="url-input" class="form-label">Ссылка RSS</label>
            <div class="d-flex">
              <input 
                type="text" 
                name="url"
                id="url-input" 
                class="form-control" 
                placeholder="https://example.com/rss"
                aria-label="url"
              >
              <button type="submit" class="btn btn-primary ms-2">Добавить</button>
            </div>
            <div class="feedback text-danger small mt-1"></div>
          </div>
        </form>

        <div class="feeds-section mt-4">
          <h2>Фиды</h2>
          <ul class="list-group feeds"></ul>
        </div>

        <div class="posts-section mt-4">
          <h2>Посты</h2>
          <ul class="list-group posts"></ul>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          <a href="#" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Читать полностью</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
