<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Reader</title>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h1 class="text-center mb-4">RSS агрегатор</h1>
                <p class="text-center text-muted mb-4">Начните читать RSS сегодня! Это легко, красиво и удобно.</p>
                
                <form id="rss-form" class="mb-4">
                    <div class="mb-3">
                        <label for="rss-url" class="form-label">Ссылка RSS</label>
                        <div class="input-group">
                            <input 
                                type="text" 
                                class="form-control" 
                                id="rss-url" 
                                placeholder="https://example.com/rss"
                                aria-describedby="feedback"
                                autofocus
                            >
                            <button type="submit" id="submit-button" class="btn btn-primary">Добавить</button>
                        </div>
                        <div id="feedback" class="form-text"></div>
                    </div>
                </form>

                <div class="row">
                    <div class="col-md-5">
                        <div id="feeds-container" class="mt-4"></div>
                    </div>
                    <div class="col-md-7">
                        <div id="posts-container" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="postModalLabel"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                    <a href="#" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Читать полностью</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/scripts/main.js"></script>
</body>
</html>
